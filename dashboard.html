<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JobNimble – Manager Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F4600C;
      --dark:   #0D0F10;
      --panel:  #161A1D;
      --border: #252B2F;
      --text:   #E8EAE9;
      --muted:  #6B7477;
      --green:  #22C55E;
      --yellow: #EAB308;
      --red:    #EF4444;
    }

    html, body { height: 100%; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 1000;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      color: var(--orange);
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    #liveIndicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .dot-live {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 1.6s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-head {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-head h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    #workerCount {
      font-size: 1.6rem;
      font-family: 'Barlow Condensed', sans-serif;
      color: var(--orange);
      line-height: 1;
      margin-top: 4px;
    }

    #workerList {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    #workerList::-webkit-scrollbar { width: 4px; }
    #workerList::-webkit-scrollbar-track { background: transparent; }
    #workerList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .worker-card {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .worker-card:hover { background: rgba(244,96,12,0.06); }
    .worker-card.selected { background: rgba(244,96,12,0.12); border-left: 3px solid var(--orange); }

    .worker-card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .worker-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .worker-name-label {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.2;
    }

    .worker-status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-left: auto;
      flex-shrink: 0;
    }

    .worker-meta {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .worker-meta span { color: var(--text); }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.7;
    }

    /* ── Map ── */
    #map {
      flex: 1;
      z-index: 1;
    }

    /* Leaflet popup styling */
    .leaflet-popup-content-wrapper {
      background: var(--panel) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
      font-family: 'Barlow', sans-serif !important;
    }

    .leaflet-popup-tip {
      background: var(--panel) !important;
    }

    .leaflet-popup-content {
      margin: 14px 16px !important;
      min-width: 180px !important;
    }

    .popup-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .popup-row {
      font-size: 0.78rem;
      color: #8A9498;
      margin-bottom: 3px;
    }

    .popup-row span { color: var(--text); }

    /* Mobile: collapse sidebar */
    @media (max-width: 600px) {
      .sidebar { width: 100%; height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
      .main { flex-direction: column; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">⬡ JobNimble — Dashboard</div>
    <div class="header-right">
      <div id="liveIndicator">
        <div class="dot-live"></div> Live
      </div>
      <div id="lastRefresh">—</div>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-head">
        <h2>Active Workers</h2>
        <div id="workerCount">0</div>
      </div>
      <div id="workerList">
        <div class="empty-state">No workers online yet.<br>Workers appear here when they start tracking.</div>
      </div>
    </aside>
    <div id="map"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ── Firebase ──────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyD9VGtbHX0lSOBIaUVkL9D8kHyu3BaKmAs",
      authDomain:        "jobnimbletracker.firebaseapp.com",
      databaseURL:       "https://jobnimbletracker-default-rtdb.firebaseio.com",
      projectId:         "jobnimbletracker",
      storageBucket:     "jobnimbletracker.firebasestorage.app",
      messagingSenderId: "16767088702",
      appId:             "1:16767088702:web:81661224bb1a89df0f796f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ── Map init — centered on Florida ────────────────────────────────
    const map = L.map('map', { zoomControl: true }).setView([27.8, -81.7], 7);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // ── State ─────────────────────────────────────────────────────────
    const workers  = {};   // name → { lat, lng, online, timestamp, accuracy }
    const markers  = {};   // name → Leaflet marker
    const COLORS = ['#F4600C','#3B82F6','#22C55E','#A855F7','#EAB308','#EC4899','#14B8A6'];
    let colorIndex = 0;
    const workerColors = {};

    function getColor(name) {
      if (!workerColors[name]) {
        workerColors[name] = COLORS[colorIndex % COLORS.length];
        colorIndex++;
      }
      return workerColors[name];
    }

    function initials(name) {
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
    }

    // ── Custom marker icon ─────────────────────────────────────────────
    function makeIcon(name, online) {
      const color = getColor(name);
      const opacity = online ? '1' : '0.4';
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="48" viewBox="0 0 40 48">
          <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.45"/></filter>
          <path d="M20 2C11.163 2 4 9.163 4 18c0 11 16 28 16 28S36 29 36 18C36 9.163 28.837 2 20 2z"
                fill="${color}" opacity="${opacity}" filter="url(#sh)"/>
          <circle cx="20" cy="18" r="10" fill="#fff" opacity="0.15"/>
          <text x="20" y="23" text-anchor="middle"
                font-family="Barlow Condensed, sans-serif"
                font-size="11" font-weight="700" fill="#fff">${initials(name)}</text>
        </svg>`;
      return L.divIcon({
        html: svg,
        className: '',
        iconSize:   [40, 48],
        iconAnchor: [20, 48],
        popupAnchor:[0, -50]
      });
    }

    // ── Popup content ──────────────────────────────────────────────────
    function popupHTML(name, data) {
      const time  = data.timestamp ? new Date(data.timestamp).toLocaleTimeString() : '—';
      const acc   = data.accuracy  ? data.accuracy + ' m' : '—';
      const color = getColor(name);
      return `
        <div class="popup-name" style="color:${color}">${name}</div>
        <div class="popup-row">Status: <span style="color:${data.online ? 'var(--green)':'var(--red)'}">${data.online ? 'Online' : 'Offline'}</span></div>
        <div class="popup-row">Last update: <span>${time}</span></div>
        <div class="popup-row">GPS accuracy: <span>${acc}</span></div>
        <div class="popup-row">Lat: <span>${(+data.lat).toFixed(5)}</span></div>
        <div class="popup-row">Lng: <span>${(+data.lng).toFixed(5)}</span></div>
      `;
    }

    // ── Sidebar card ───────────────────────────────────────────────────
    function renderSidebar() {
      const list = document.getElementById('workerList');
      const names = Object.keys(workers);
      document.getElementById('workerCount').textContent = names.length;

      if (names.length === 0) {
        list.innerHTML = '<div class="empty-state">No workers online yet.<br>Workers appear here when they start tracking.</div>';
        return;
      }

      list.innerHTML = names.map(name => {
        const d = workers[name];
        const color = getColor(name);
        const time  = d.timestamp ? new Date(d.timestamp).toLocaleTimeString() : '—';
        const statusColor = d.online ? 'var(--green)' : 'var(--red)';
        return `
          <div class="worker-card" onclick="focusWorker('${name}')" id="card-${CSS.escape(name)}">
            <div class="worker-card-top">
              <div class="worker-avatar" style="background:${color}">${initials(name)}</div>
              <div class="worker-name-label">${name}</div>
              <div class="worker-status-dot" style="background:${statusColor}"></div>
            </div>
            <div class="worker-meta">
              Updated: <span>${time}</span><br>
              ${d.online ? 'Active ✓' : 'Offline'}
            </div>
          </div>`;
      }).join('');
    }

    function focusWorker(name) {
      const d = workers[name];
      if (!d) return;
      map.setView([d.lat, d.lng], 14, { animate: true });
      if (markers[name]) markers[name].openPopup();
      document.querySelectorAll('.worker-card').forEach(c => c.classList.remove('selected'));
      const card = document.getElementById('card-' + CSS.escape(name));
      if (card) card.classList.add('selected');
    }

    // ── Firebase real-time listener ────────────────────────────────────
    db.ref('workers').on('value', snapshot => {
      const data = snapshot.val() || {};

      // Remove markers for workers no longer in DB
      Object.keys(markers).forEach(name => {
        if (!data[name]) {
          map.removeLayer(markers[name]);
          delete markers[name];
          delete workers[name];
        }
      });

      // Add / update
      Object.entries(data).forEach(([name, d]) => {
        workers[name] = d;
        const latlng = [+d.lat, +d.lng];
        if (markers[name]) {
          markers[name].setLatLng(latlng);
          markers[name].setIcon(makeIcon(name, d.online));
          markers[name].setPopupContent(popupHTML(name, d));
        } else {
          const marker = L.marker(latlng, { icon: makeIcon(name, d.online) })
            .addTo(map)
            .bindPopup(popupHTML(name, d));
          markers[name] = marker;
        }
      });

      renderSidebar();
      document.getElementById('lastRefresh').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    });
  </script>
</body>
</html>
