<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jungle JobNimble – Service Member</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0D0F10;
      --bg2:    #161A1D;
      --border: #252B2F;
      --accent: #F4600C;
      --text:   #E8EAE9;
      --muted:  #6B7477;
      --green:  #22C55E;
      --yellow: #EAB308;
      --red:    #EF4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Header ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 18px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .header-btns { display: flex; gap: 8px; }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: var(--border); color: var(--text); }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
      gap: 14px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 20px;
      width: 100%;
      max-width: 400px;
    }

    /* ── Ring / status ── */
    .ring-wrap {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 18px;
    }
    .status-ring {
      width: 78px; height: 78px;
      border-radius: 50%;
      border: 3px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem;
      margin-bottom: 10px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .status-ring.active { border-color: var(--green); animation: pulse 2.5s ease-in-out infinite; }
    .status-ring.lunch  { border-color: var(--yellow); box-shadow: 0 0 18px rgba(234,179,8,0.2); }
    .status-ring.idle   { border-color: var(--border); }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 10px rgba(34,197,94,0.2); }
      50%     { box-shadow: 0 0 26px rgba(34,197,94,0.45); }
    }

    .sm-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.35rem; color: var(--accent);
      text-align: center; font-weight: 700; letter-spacing: 0.04em;
    }
    .status-pill {
      display: inline-block;
      padding: 2px 12px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-top: 5px;
    }
    .pill-idle   { background: rgba(107,116,119,0.18); color: var(--muted); }
    .pill-active { background: rgba(34,197,94,0.14);   color: var(--green); }
    .pill-lunch  { background: rgba(234,179,8,0.14);   color: var(--yellow); }

    /* ── Name input ── */
    .name-wrap { margin-bottom: 14px; }
    .name-wrap label {
      display: block; font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-bottom: 5px; text-align: center;
    }
    .name-wrap input {
      width: 100%;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'Barlow', sans-serif; font-size: 1rem;
      padding: 10px 14px; outline: none; text-align: center;
      transition: border-color 0.2s;
    }
    .name-wrap input:focus { border-color: var(--accent); }

    /* ── Buttons ── */
    .btn-group { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; }
    .btn-row   { display: flex; gap: 9px; }
    .btn {
      flex: 1; padding: 12px;
      border: none; border-radius: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.97rem; letter-spacing: 0.07em;
      text-transform: uppercase; font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-lunch     { background: rgba(234,179,8,0.16); color: var(--yellow); border: 1px solid rgba(234,179,8,0.28); }
    .btn-off-lunch { background: rgba(34,197,94,0.14); color: var(--green);  border: 1px solid rgba(34,197,94,0.28); }
    .btn-danger    { background: rgba(239,68,68,0.14); color: var(--red);    border: 1px solid rgba(239,68,68,0.28); }

    /* ── Coords ── */
    .coords-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px;
      font-size: 0.77rem; color: var(--muted);
      font-family: monospace; line-height: 1.9;
      margin-bottom: 12px;
    }
    .coords-box span { color: var(--text); }

    /* ── Timer bar ── */
    .timer-bar-wrap {
      background: var(--border); border-radius: 4px;
      height: 3px; overflow: hidden; margin-bottom: 4px;
    }
    .timer-bar { height: 100%; background: var(--accent); width: 100%; transform-origin: left; }

    /* ── Session log ── */
    .log-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 20px;
      width: 100%; max-width: 400px;
    }
    .log-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .log-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--muted);
    }
    .total-time { color: var(--accent); font-size: 0.88rem; font-weight: 600; }
    .log-empty { text-align: center; color: var(--muted); font-size: 0.83rem; padding: 10px 0; }
    .log-entry {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 0.83rem;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-icon  { font-size: 0.9rem; width: 18px; text-align: center; flex-shrink: 0; padding-top: 1px; }
    .log-label { color: var(--muted); flex: 1; }
    .log-time  { color: var(--text); font-weight: 600; font-family: monospace; text-align: right; }
    .log-dur   { color: var(--muted); font-size: 0.7rem; display: block; }

    /* ── Settings panel ── */
    .settings-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
    }
    .settings-overlay.open { display: block; }
    .settings-panel {
      position: fixed; top: 0; right: -310px; width: 290px;
      height: 100vh; background: var(--bg2);
      border-left: 1px solid var(--border);
      z-index: 201; padding: 22px 18px;
      transition: right 0.28s ease; overflow-y: auto;
    }
    .settings-panel.open { right: 0; }
    .settings-panel h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-bottom: 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; }
    .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .theme-chip {
      border-radius: 10px; padding: 11px; cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.2s; text-align: center;
      background: var(--bg);
    }
    .theme-chip.selected { border-color: var(--accent); }
    .theme-swatch { width: 100%; height: 26px; border-radius: 6px; margin-bottom: 5px; }
    .theme-name { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); }

    footer { text-align: center; font-size: 0.68rem; color: var(--muted); padding: 14px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🌿 Jungle JobNimble</div>
  <div class="header-btns">
    <button class="icon-btn" id="moodBtn" onclick="toggleMood()" title="Day/Night">🌙</button>
    <button class="icon-btn" onclick="openSettings()" title="Settings">⚙️</button>
  </div>
</header>

<main>
  <div class="card">
    <div class="ring-wrap">
      <div class="status-ring idle" id="ring">🏗️</div>
      <div class="sm-name" id="displayName">Service Member</div>
      <div class="status-pill pill-idle" id="statusPill">Off Duty</div>
    </div>

    <div class="name-wrap" id="nameWrap">
      <label>Your Name</label>
      <input type="text" id="nameInput" placeholder="e.g. Carlos M." autocomplete="off"/>
    </div>

    <div class="btn-group" id="btnGroup"></div>

    <div class="coords-box">
      Lat: <span id="lat">—</span><br>
      Lng: <span id="lng">—</span><br>
      Last update: <span id="lastUpdate">—</span>
    </div>

    <div class="timer-bar-wrap" id="timerWrap" style="display:none">
      <div class="timer-bar" id="timerBar"></div>
    </div>
  </div>

  <div class="log-card">
    <div class="log-header">
      <div class="log-title">Today's Log</div>
      <div class="total-time" id="totalTime"></div>
    </div>
    <div id="sessionLog"><div class="log-empty">No activity yet today</div></div>
  </div>
</main>

<footer>Keep this page open while on site.</footer>

<div class="settings-overlay" id="overlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <h3>Appearance <button class="close-btn" onclick="closeSettings()">✕</button></h3>
  <div class="theme-grid" id="themeGrid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyD9VGtbHX0lSOBIaUVkL9D8kHyu3BaKmAs",
  authDomain:"jobnimbletracker.firebaseapp.com",
  databaseURL:"https://jobnimbletracker-default-rtdb.firebaseio.com",
  projectId:"jobnimbletracker",
  storageBucket:"jobnimbletracker.firebasestorage.app",
  messagingSenderId:"16767088702",
  appId:"1:16767088702:web:81661224bb1a89df0f796f"
});
const db = firebase.database();

// ── Themes ────────────────────────────────────────────────────────────
const THEMES = {
  midnight:{ name:'Midnight', bg:'#0D0F10', bg2:'#161A1D', border:'#252B2F', accent:'#F4600C', text:'#E8EAE9', muted:'#6B7477', sw:'linear-gradient(135deg,#0D0F10 40%,#F4600C)' },
  forest:  { name:'Forest',   bg:'#0A1210', bg2:'#111A16', border:'#1E2E26', accent:'#22C55E', text:'#E2EDE8', muted:'#5E7A6A', sw:'linear-gradient(135deg,#0A1210 40%,#22C55E)' },
  navy:    { name:'Navy',     bg:'#080E1A', bg2:'#0E1729', border:'#1A2540', accent:'#38BDF8', text:'#E0EEFF', muted:'#4A6080', sw:'linear-gradient(135deg,#080E1A 40%,#38BDF8)' },
  slate:   { name:'Slate',    bg:'#0F1117', bg2:'#171B24', border:'#252A38', accent:'#818CF8', text:'#E4E5F0', muted:'#5C6280', sw:'linear-gradient(135deg,#0F1117 40%,#818CF8)' },
  desert:  { name:'Desert',   bg:'#12100A', bg2:'#1A1710', border:'#2E2A1E', accent:'#F59E0B', text:'#EDE9E0', muted:'#736B55', sw:'linear-gradient(135deg,#12100A 40%,#F59E0B)' },
};

function applyTheme(key) {
  const t = THEMES[key]; if (!t) return;
  const s = document.documentElement.style;
  s.setProperty('--bg',     t.bg);
  s.setProperty('--bg2',    t.bg2);
  s.setProperty('--border', t.border);
  s.setProperty('--accent', t.accent);
  s.setProperty('--text',   t.text);
  s.setProperty('--muted',  t.muted);
  localStorage.setItem('jjn-w-theme', key);
  buildThemeGrid(key);
}

function buildThemeGrid(sel) {
  document.getElementById('themeGrid').innerHTML = Object.entries(THEMES).map(([k,t])=>`
    <div class="theme-chip ${sel===k?'selected':''}" onclick="applyTheme('${k}')">
      <div class="theme-swatch" style="background:${t.sw}"></div>
      <div class="theme-name">${t.name}</div>
    </div>`).join('');
}

// ── Mood toggle ───────────────────────────────────────────────────────
let dayMood = localStorage.getItem('jjn-w-day') === 'true';
function applyMood() {
  document.body.style.filter = dayMood ? 'brightness(1.1) saturate(0.85)' : '';
  document.getElementById('moodBtn').textContent = dayMood ? '☀️' : '🌙';
  localStorage.setItem('jjn-w-day', dayMood);
}
function toggleMood() { dayMood = !dayMood; applyMood(); }

// ── Settings ──────────────────────────────────────────────────────────
function openSettings()  { document.getElementById('settingsPanel').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closeSettings() { document.getElementById('settingsPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

// ── State ─────────────────────────────────────────────────────────────
const UPDATE_MS = 5 * 60 * 1000;
let workerName = '';
let status     = 'clocked_out';
let sessions   = [];
let sessDate   = '';
let intervalId = null;
let timerAnim  = null;

// ── Name resolution ───────────────────────────────────────────────────
const urlName = new URLSearchParams(location.search).get('name');
if (urlName) {
  workerName = urlName.trim();
  document.getElementById('displayName').textContent = workerName;
  document.getElementById('nameWrap').style.display = 'none';
  loadState();
}

function resolveName() {
  if (workerName) return true;
  const v = document.getElementById('nameInput').value.trim();
  if (!v) { alert('Please enter your name first.'); return false; }
  workerName = v;
  document.getElementById('displayName').textContent = workerName;
  document.getElementById('nameWrap').style.display = 'none';
  loadState();
  return true;
}

function loadState() {
  db.ref('workers/' + workerName).once('value', snap => {
    const d = snap.val();
    if (!d) { renderUI(); return; }
    const today = todayStr();
    if (d.sessionDate === today) {
      sessions = d.sessions || [];
      status   = d.status   || 'clocked_out';
      sessDate = today;
    }
    renderUI();
    if (status === 'clocked_in') startInterval();
  });
}

// ── Helpers ───────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtTime(iso) { return iso ? new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—'; }
function diffMin(a, b) { return !a||!b ? 0 : Math.max(0, Math.round((new Date(b)-new Date(a))/60000)); }
function fmtDur(m) { const h=Math.floor(m/60); return h ? `${h}h ${m%60}m` : `${m%60}m`; }

function totalWorkedMins() {
  return sessions.reduce((acc, s) => {
    const end = s.clockOut || new Date().toISOString();
    let w = diffMin(s.clockIn, end);
    if (s.lunchStart) {
      const le = s.lunchEnd || (status==='on_lunch' ? new Date().toISOString() : null);
      if (le) w -= diffMin(s.lunchStart, le);
    }
    return acc + Math.max(0, w);
  }, 0);
}

// ── GPS push ──────────────────────────────────────────────────────────
function pushLocation(cb) {
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude:lat, longitude:lng, accuracy } = pos.coords;
    const ts = new Date().toISOString();
    document.getElementById('lat').textContent        = lat.toFixed(6);
    document.getElementById('lng').textContent        = lng.toFixed(6);
    document.getElementById('lastUpdate').textContent = fmtTime(ts);
    db.ref('workers/' + workerName).set({
      lat, lng, accuracy: Math.round(accuracy),
      timestamp: ts, online: status !== 'clocked_out',
      status, sessions, sessionDate: todayStr()
    });
    resetTimerBar();
    if (cb) cb();
  }, err => alert('GPS error: ' + err.message),
  { enableHighAccuracy:true, timeout:15000, maximumAge:0 });
}

// ── Actions ───────────────────────────────────────────────────────────
function clockIn() {
  if (!resolveName()) return;
  if (sessDate !== todayStr()) { sessions = []; sessDate = todayStr(); }
  sessions.push({ clockIn: new Date().toISOString(), lunchStart:null, lunchEnd:null, clockOut:null });
  status = 'clocked_in';
  renderUI();
  pushLocation();
  startInterval();
}

function goToLunch() {
  const s = sessions[sessions.length-1];
  if (s) s.lunchStart = new Date().toISOString();
  status = 'on_lunch';
  stopInterval();
  renderUI();
  pushLocation(); // snapshot at lunch start
}

function offLunch() {
  const s = sessions[sessions.length-1];
  if (s) s.lunchEnd = new Date().toISOString();
  status = 'clocked_in';
  renderUI();
  pushLocation(); // snapshot returning from lunch
  startInterval();
}

function clockOut() {
  const s = sessions[sessions.length-1];
  if (s) {
    if (status === 'on_lunch' && s.lunchStart && !s.lunchEnd)
      s.lunchEnd = new Date().toISOString();
    s.clockOut = new Date().toISOString();
  }
  status = 'clocked_out';
  stopInterval();
  renderUI();
  pushLocation(() => db.ref('workers/' + workerName).update({ online:false }));
}

// ── Interval ──────────────────────────────────────────────────────────
function startInterval() { stopInterval(); intervalId = setInterval(pushLocation, UPDATE_MS); }
function stopInterval()  { clearInterval(intervalId); intervalId = null; }

// ── Timer bar ─────────────────────────────────────────────────────────
function resetTimerBar() {
  if (timerAnim) cancelAnimationFrame(timerAnim);
  const wrap = document.getElementById('timerWrap');
  const bar  = document.getElementById('timerBar');
  if (status !== 'clocked_in') { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  const start = Date.now();
  function tick() {
    const pct = Math.max(0, 1 - (Date.now()-start)/UPDATE_MS);
    bar.style.transform = `scaleX(${pct})`;
    if (pct > 0) timerAnim = requestAnimationFrame(tick);
  }
  tick();
}

// ── Render ────────────────────────────────────────────────────────────
function renderUI() {
  const ring = document.getElementById('ring');
  const pill = document.getElementById('statusPill');
  const bg   = document.getElementById('btnGroup');

  if (status === 'clocked_in') {
    ring.className = 'status-ring active'; ring.textContent = '📍';
    pill.className = 'status-pill pill-active'; pill.textContent = 'Active';
    bg.innerHTML = `
      <div class="btn-row">
        <button class="btn btn-lunch"  onclick="goToLunch()">🍽 Go to Lunch</button>
        <button class="btn btn-danger" onclick="clockOut()">■ Clock Out</button>
      </div>`;
    resetTimerBar();
  } else if (status === 'on_lunch') {
    ring.className = 'status-ring lunch'; ring.textContent = '🍽';
    pill.className = 'status-pill pill-lunch'; pill.textContent = 'On Lunch';
    bg.innerHTML = `
      <div class="btn-row">
        <button class="btn btn-off-lunch" onclick="offLunch()">▶ Off Lunch</button>
        <button class="btn btn-danger"    onclick="clockOut()">■ Clock Out</button>
      </div>`;
    document.getElementById('timerWrap').style.display = 'none';
  } else {
    ring.className = 'status-ring idle'; ring.textContent = '🏗️';
    pill.className = 'status-pill pill-idle'; pill.textContent = 'Off Duty';
    bg.innerHTML = `<button class="btn btn-primary" onclick="clockIn()">▶ Clock In</button>`;
    document.getElementById('timerWrap').style.display = 'none';
  }

  renderLog();
}

function renderLog() {
  const logEl = document.getElementById('sessionLog');
  const totEl = document.getElementById('totalTime');
  if (!sessions.length) {
    logEl.innerHTML = '<div class="log-empty">No activity yet today</div>';
    totEl.textContent = '';
    return;
  }
  const mins = totalWorkedMins();
  totEl.textContent = mins > 0 ? fmtDur(mins) + ' worked' : '';

  logEl.innerHTML = sessions.flatMap((s, i) => {
    const rows = [];
    const label = sessions.length > 1 ? ` #${i+1}` : '';
    rows.push(`<div class="log-entry">
      <div class="log-icon">▶</div>
      <div class="log-label">Clock In${label}</div>
      <div class="log-time">${fmtTime(s.clockIn)}</div>
    </div>`);
    if (s.lunchStart) rows.push(`<div class="log-entry">
      <div class="log-icon">🍽</div>
      <div class="log-label">Lunch</div>
      <div class="log-time">${fmtTime(s.lunchStart)}</div>
    </div>`);
    if (s.lunchEnd) rows.push(`<div class="log-entry">
      <div class="log-icon">▶</div>
      <div class="log-label">Off Lunch</div>
      <div class="log-time">${fmtTime(s.lunchEnd)}<span class="log-dur">${fmtDur(diffMin(s.lunchStart,s.lunchEnd))} break</span></div>
    </div>`);
    if (s.clockOut) rows.push(`<div class="log-entry">
      <div class="log-icon">■</div>
      <div class="log-label">Clock Out</div>
      <div class="log-time">${fmtTime(s.clockOut)}</div>
    </div>`);
    return rows;
  }).join('');
}

// ── Init ──────────────────────────────────────────────────────────────
applyTheme(localStorage.getItem('jjn-w-theme') || 'midnight');
applyMood();
renderUI();

window.addEventListener('beforeunload', () => {
  if (workerName) db.ref('workers/' + workerName + '/online').set(false);
});
</script>
</body>
</html>
