<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JobNimble Tracker – Worker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F4600C;
      --dark:   #0D0F10;
      --card:   #161A1D;
      --border: #2A2F33;
      --text:   #E8EAE9;
      --muted:  #7A8589;
      --green:  #22C55E;
      --yellow: #EAB308;
      --red:    #EF4444;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .status-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      border: 3px solid var(--border);
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    .status-ring.active {
      border-color: var(--green);
      box-shadow: 0 0 24px rgba(34,197,94,0.25);
      animation: pulse 2.5s ease-in-out infinite;
    }
    .status-ring.waiting { border-color: var(--yellow); }
    .status-ring.error   { border-color: var(--red); }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 16px rgba(34,197,94,0.2); }
      50%       { box-shadow: 0 0 36px rgba(34,197,94,0.45); }
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .worker-name {
      color: var(--orange);
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .status-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .status-msg {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 28px;
      min-height: 24px;
      transition: color 0.3s;
    }

    .coords-box {
      background: #0D0F10;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 24px;
      font-size: 0.8rem;
      color: var(--muted);
      font-family: monospace;
      line-height: 1.8;
      text-align: left;
    }

    .coords-box span { color: var(--text); }

    .timer-bar-wrap {
      background: var(--border);
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .timer-bar {
      height: 100%;
      background: var(--orange);
      width: 100%;
      transform-origin: left;
      transition: transform 1s linear;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-start  { background: var(--orange); color: #fff; }
    .btn-stop   { background: var(--border); color: var(--muted); display: none; }

    .name-input-wrap { margin-bottom: 24px; display: none; }
    .name-input-wrap input {
      width: 100%;
      background: #0D0F10;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      padding: 12px 16px;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    .name-input-wrap input:focus { border-color: var(--orange); }
    .name-input-wrap label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    footer {
      margin-top: 32px;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo">⬡ JobNimble Tracker</div>

  <div class="card">
    <div class="status-ring waiting" id="ring">📍</div>
    <h1>Worker Check-In</h1>
    <div class="worker-name" id="displayName">—</div>

    <div class="name-input-wrap" id="nameWrap">
      <label>Your Name</label>
      <input type="text" id="nameInput" placeholder="e.g. Carlos M." autocomplete="off"/>
    </div>

    <div class="status-label">Status</div>
    <div class="status-msg" id="statusMsg">Ready to start tracking</div>

    <div class="coords-box" id="coordsBox">
      Lat: <span id="lat">—</span><br>
      Lng: <span id="lng">—</span><br>
      Last update: <span id="lastUpdate">—</span>
    </div>

    <div class="timer-bar-wrap" id="timerWrap" style="display:none">
      <div class="timer-bar" id="timerBar"></div>
    </div>

    <button class="btn btn-start" id="btnStart" onclick="startTracking()">Start Tracking</button>
    <button class="btn btn-stop"  id="btnStop"  onclick="stopTracking()">Stop Tracking</button>
  </div>

  <footer>Keep this page open while on site.<br>Closing it will stop location updates.</footer>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script>
    // ── Firebase config ──────────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyD9VGtbHX0lSOBIaUVkL9D8kHyu3BaKmAs",
      authDomain:        "jobnimbletracker.firebaseapp.com",
      databaseURL:       "https://jobnimbletracker-default-rtdb.firebaseio.com",
      projectId:         "jobnimbletracker",
      storageBucket:     "jobnimbletracker.firebasestorage.app",
      messagingSenderId: "16767088702",
      appId:             "1:16767088702:web:81661224bb1a89df0f796f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ── State ────────────────────────────────────────────────────────
    const UPDATE_INTERVAL_MS = 5 * 60 * 1000; // 5 minutes
    let workerName = '';
    let intervalId = null;
    let timerCount = 0;
    let timerAnimId = null;

    // ── Read name from URL param or show input ────────────────────────
    const params = new URLSearchParams(window.location.search);
    const urlName = params.get('name');
    if (urlName) {
      workerName = urlName.trim();
      document.getElementById('displayName').textContent = workerName;
    } else {
      document.getElementById('nameWrap').style.display = 'block';
      document.getElementById('displayName').textContent = 'Enter your name below';
    }

    // ── UI helpers ───────────────────────────────────────────────────
    function setStatus(msg, type='neutral') {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.style.color = type === 'ok' ? 'var(--green)' : type === 'err' ? 'var(--red)' : 'var(--text)';
    }

    function startTimerBar() {
      const bar = document.getElementById('timerBar');
      document.getElementById('timerWrap').style.display = 'block';
      const start = Date.now();
      function tick() {
        const elapsed = Date.now() - start;
        const pct = Math.max(0, 1 - elapsed / UPDATE_INTERVAL_MS);
        bar.style.transform = `scaleX(${pct})`;
        if (pct > 0) timerAnimId = requestAnimationFrame(tick);
      }
      tick();
    }

    // ── Core logic ───────────────────────────────────────────────────
    function pushLocation() {
      navigator.geolocation.getCurrentPosition(
        pos => {
          const { latitude, longitude, accuracy } = pos.coords;
          const now = new Date();

          db.ref('workers/' + workerName).set({
            lat:  latitude,
            lng:  longitude,
            accuracy: Math.round(accuracy),
            timestamp: now.toISOString(),
            online: true
          });

          document.getElementById('lat').textContent = latitude.toFixed(6);
          document.getElementById('lng').textContent = longitude.toFixed(6);
          document.getElementById('lastUpdate').textContent = now.toLocaleTimeString();
          setStatus('Location sent ✓', 'ok');

          // Reset timer bar
          if (timerAnimId) cancelAnimationFrame(timerAnimId);
          startTimerBar();
        },
        err => {
          setStatus('GPS error: ' + err.message, 'err');
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    function startTracking() {
      // Resolve name
      if (!urlName) {
        const input = document.getElementById('nameInput').value.trim();
        if (!input) { setStatus('Please enter your name first', 'err'); return; }
        workerName = input;
        document.getElementById('displayName').textContent = workerName;
        document.getElementById('nameWrap').style.display = 'none';
      }

      document.getElementById('btnStart').style.display = 'none';
      document.getElementById('btnStop').style.display  = 'block';
      document.getElementById('ring').className = 'status-ring active';
      setStatus('Tracking active', 'ok');

      pushLocation(); // immediate first push
      intervalId = setInterval(pushLocation, UPDATE_INTERVAL_MS);
    }

    function stopTracking() {
      clearInterval(intervalId);
      if (timerAnimId) cancelAnimationFrame(timerAnimId);
      if (workerName) {
        db.ref('workers/' + workerName + '/online').set(false);
      }
      document.getElementById('btnStart').style.display = 'block';
      document.getElementById('btnStop').style.display  = 'none';
      document.getElementById('ring').className = 'status-ring waiting';
      document.getElementById('timerWrap').style.display = 'none';
      setStatus('Tracking stopped', 'neutral');
    }

    // Mark offline when tab closes
    window.addEventListener('beforeunload', () => {
      if (workerName) db.ref('workers/' + workerName + '/online').set(false);
    });
  </script>
</body>
</html>
